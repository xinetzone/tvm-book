[tool.pdm]
allow_prereleases = true
version = { source = "file", path = "src/tvm_book/__init__.py" }

[project]
name = "tvm-book"
dynamic = ["version", "description"]
authors = [
    {name = "xinetzone", email = "xinzone@outlook.com"},
]
dependencies = [
    "taolib",
    "tables", # 处理数据
    # "tvmx @ file:///${PROJECT_ROOT}/..",
    # "tvmx @ file:///media/pc/data/lxw/ai/tvm/xinetzone",
]
requires-python = ">=3.10"
readme = "README.md"
license = {file = "LICENSE"}

[build-system]
requires = ["pdm-pep517"]
build-backend = "pdm.pep517.api"

[project.urls]
Homepage = "https://xinetzone.github.io/tvm-book"
Repository = "https://github.com/xinetzone/tvm-book"
Documentation = "https://xinetzone.github.io/tvm-book"

# [project.entry-points]
# "sphinx.html_themes" = {tvm_book = "tvm_book"}

[project.optional-dependencies]
doc = [
  "invoke",
  "tqdm",
  "sphinx",
  "mdit-py-plugins",
  "myst-nb",
  "xyzstyle",
  "matplotlib",
  "sphinx-copybutton",
  "sphinxcontrib-bibtex",
  "sphinx-thebe",
  "sphinx-design",
  "sphinx-automodapi",
  "sphinx-sitemap",
  "sphinx_plotly_directive",
  "sphinx-comments",
  "sphinxcontrib-mermaid",
  "plotly",
  "sphinxcontrib-websupport",
  "autodocsumm",
  "sphinx-autoapi",
  "lxml",
  "sphinx-icon",
  "readthedocs-sphinx-ext",
]

dev = [
  "xgboost",
  "pickleshare",
  "cloudpickle",
]

[tool.pdm.build]
# package-dir = "src"
# includes = []
excludes = ["doc", ".github"]
source-includes = ["tests/"]
